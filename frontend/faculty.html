<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard - SatisfyPulse</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="purple-bar"></div>
    <div class="white-bar">
        <div class="logo">
            <h1>SatisfyPulse</h1>
            <p>Bannari Amman Institute of Technology</p>
        </div>
        <div class="user-info">
            <span id="userName"></span>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2>Welcome, <span id="facultyName"></span>!</h2>
            <p>View feedback received from students.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-comments" style="font-size: 30px;"></i>
                <h4>Total Feedbacks</h4>
                <div class="value" id="totalFeedback">0</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-star" style="font-size: 30px;"></i>
                <h4>Average Rating</h4>
                <div class="value" id="avgRating">0</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-smile" style="font-size: 30px;"></i>
                <h4>Positive Feedback</h4>
                <div class="value" id="positiveCount">0</div>
            </div>
        </div>

        <div id="adminAlertContainer"></div>
        <div id="adminRemarkContainer"></div>

        <div class="card">
            <h3><i class="fas fa-list"></i> Academic Feedback (Course-wise)</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Student</th><th>Course</th><th>Clarity</th><th>Materials</th><th>Time Mgmt</th><th>Syllabus</th><th>Total</th><th>Sentiment</th><th>Date</th>
                    </thead>
                    <tbody id="feedbackList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // BACKEND API URL
        
        async function loadUserData() {
            try {
                const response = await fetch(`/api/me`, { 
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' }
                });
                if (!response.ok) {
                    window.location.href = 'login.html';
                    return;
                }
                const user = await response.json();
                document.getElementById('userName').textContent = user.full_name;
                document.getElementById('facultyName').textContent = user.full_name.split(' ')[0];
                
                // Load metrics and alerts
                loadAlerts();
                loadFeedback();
            } catch (error) {
                window.location.href = 'login.html';
            }
        }

        async function loadAlerts() {
            try {
                const response = await fetch(`/api/faculty/my-alerts`, { 
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' }
                });
                const alerts = await response.json();
                const container = document.getElementById('adminAlertContainer');
                
                if (alerts.length > 0) {
                    container.innerHTML = alerts.map(alert => `
                        <div class="card" style="background: linear-gradient(135deg, #fff5f5 0%, #fed7d7 100%); color: #c53030; border-left: 5px solid #c53030; margin-bottom: 20px;">
                            <h3 style="color: #c53030;"><i class="fas fa-exclamation-circle"></i> Official Admin Alert</h3>
                            <p style="margin-top: 10px; font-size: 16px; font-weight: 500;">
                                ${alert.message}
                            </p>
                            <small style="opacity: 0.7; display: block; margin-top: 5px;">
                                Received on: ${new Date(alert.created_at).toLocaleString()}
                            </small>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '';
                }
            } catch (error) {
                console.error('Error loading alerts:', error);
            }
        }

        async function loadFeedback() {
            try {
                const response = await fetch(`/api/faculty/my-feedback`, { 
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' }
                });
                const feedbacks = await response.json();
                
                const tbody = document.getElementById('feedbackList');
                tbody.innerHTML = '';
                
                let total = 0, sum = 0, positive = 0;
                
                feedbacks.forEach(fb => {
                    const row = tbody.insertRow();
                    row.insertCell(0).textContent = fb.student_name || 'Anonymous';
                    row.insertCell(1).textContent = fb.course_name || 'N/A';
                    row.insertCell(2).textContent = fb.clarity || '0';
                    row.insertCell(3).textContent = fb.materials || '0';
                    row.insertCell(4).textContent = fb.time_management || '0';
                    row.insertCell(5).textContent = fb.syllabus_coverage || '0';
                    row.insertCell(6).textContent = fb.overall_satisfaction || '0';
                    
                    const sentiment = fb.prediction_label || 'Neutral';
                    row.insertCell(7).innerHTML = `<span class="sentiment-${sentiment.toLowerCase()}">${sentiment}</span>`;
                    row.insertCell(8).textContent = fb.submission_date ? new Date(fb.submission_date).toLocaleDateString() : 'N/A';
                    
                    total++;
                    sum += fb.overall_satisfaction || 0;
                    if (sentiment === 'Positive') positive++;
                });
                
                document.getElementById('totalFeedback').textContent = total;
                const avgRating = total > 0 ? (sum/total).toFixed(1) : 0;
                document.getElementById('avgRating').textContent = avgRating;
                document.getElementById('positiveCount').textContent = positive;
                
                const remarkContainer = document.getElementById('adminRemarkContainer');
                if (total > 0 && parseFloat(avgRating) < 3.0) {
                    remarkContainer.innerHTML = `
                        <div class="card" style="background: linear-gradient(135deg, #fff3cd 0%, #ffeeba 100%); color: #856404; border-left: 5px solid #ffc107; margin-bottom: 20px;">
                            <h3 style="color: #856404;"><i class="fas fa-exclamation-triangle"></i> System Warning</h3>
                            <p style="margin-top: 10px; font-size: 16px; opacity: 0.9;">
                                Your average rating is currently ${avgRating}. The system has flagged this for review.
                            </p>
                        </div>
                    `;
                } else {
                    remarkContainer.innerHTML = '';
                }
            } catch (error) {
                console.error('Error loading feedback:', error);
            }
        }

        async function logout() {
            await fetch(`/api/logout`, { method: 'POST', credentials: 'include' });
            window.location.href = 'login.html';
        }

        loadUserData();
    </script>
</body>
</html>
