<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SatisfyPulse</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="purple-bar"></div>
    <div class="white-bar">
        <div class="logo">
            <h1>SatisfyPulse</h1>
            <p>Bannari Amman Institute of Technology</p>
        </div>
        <div class="user-info">
            <span id="userName"></span>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-clipboard-list"></i><h4>Total Feedback</h4><div class="value" id="totalFeedback">0</div></div>
            <div class="stat-card"><i class="fas fa-chart-line"></i><h4>Average Rating</h4><div class="value" id="avgRating">0</div></div>
            <div class="stat-card"><i class="fas fa-users"></i><h4>Total Students</h4><div class="value" id="studentCount">0</div></div>
            <div class="stat-card"><i class="fas fa-chalkboard-user"></i><h4>Total Faculty</h4><div class="value" id="facultyCount">0</div></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('feedback')"><i class="fas fa-list"></i> All Feedback</button>
            <button class="tab-btn" onclick="showTab('instructors')"><i class="fas fa-user-plus"></i> Manage Instructors</button>
            <button class="tab-btn" onclick="showTab('analytics')"><i class="fas fa-chart-pie"></i> Analytics</button>
        </div>

        <div id="feedbackTab" class="tab-content active">
            <div class="card"><h3><i class="fas fa-list"></i> All Feedback</h3><div class="table-container"><table><thead><tr><th>Category</th><th>Student</th><th>Details</th><th>Rating</th><th>Sentiment</th><th>Date</th></thead><tbody id="feedbackList"></tbody>}</div></div>
        </div>

        <div id="instructorsTab" class="tab-content">
            <div class="card"><h3><i class="fas fa-user-plus"></i> Add New Instructor</h3><form id="instructorForm"><div class="form-group"><input type="text" id="instName" placeholder="Full Name" required></div><div class="form-group"><select id="instDept" required><option value="">Select Department</option><option>COMPUTER SCIENCE AND ENGINEERING</option><option>INFORMATION TECHNOLOGY</option><option>ARTIFICIAL INTELLIGENCE AND DATA SCIENCE</option></select></div><div class="form-group"><input type="text" id="instSubject" placeholder="Subject"></div><div class="form-group"><input type="email" id="instEmail" placeholder="Email"></div><button type="submit" class="btn">Add Instructor</button></form></div>
            <div class="card"><h3><i class="fas fa-users"></i> Existing Instructors</h3><div class="table-container"><table><thead><tr><th>Name</th><th>Department</th><th>Subject</th><th>Action</th></thead><tbody id="instructorList"></tbody>}</div></div>
        </div>

        <div id="analyticsTab" class="tab-content">
            <div class="card"><h3><i class="fas fa-chart-pie"></i> Feedback Distribution</h3><canvas id="distributionChart" width="400" height="400"></canvas></div>
        </div>
    </div>

    <script>
        let distributionChart = null;

        async function loadAdminData() {
            const response = await fetch('/api/me', { credentials: 'include' });
            if (!response.ok) { window.location.href = '/login.html'; return; }
            const user = await response.json();
            document.getElementById('userName').textContent = user.full_name;
            loadStats(); loadAllFeedback(); loadInstructors(); loadAnalytics();
        }

        async function loadStats() {
            const res = await fetch('/api/admin/stats', { credentials: 'include' });
            const stats = await res.json();
            document.getElementById('totalFeedback').textContent = stats.total_feedback;
            document.getElementById('avgRating').textContent = stats.average_rating;
            document.getElementById('studentCount').textContent = stats.student_count;
            document.getElementById('facultyCount').textContent = stats.instructor_count;
        }

        async function loadAllFeedback() {
            const res = await fetch('/api/admin/all-feedback', { credentials: 'include' });
            const feedbacks = await res.json();
            const tbody = document.getElementById('feedbackList');
            tbody.innerHTML = '';
            feedbacks.forEach(fb => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = fb.category;
                row.insertCell(1).textContent = fb.student_name;
                row.insertCell(2).textContent = fb.instructor_name || fb.course_name || fb.block_name;
                row.insertCell(3).textContent = fb.overall_rating || fb.overall_satisfaction || fb.cleanliness;
                const sentiment = fb.sentiment_label || fb.prediction_label || 'Neutral';
                row.insertCell(4).innerHTML = `<span class="sentiment-${sentiment.toLowerCase()}">${sentiment}</span>`;
                row.insertCell(5).textContent = new Date(fb.submission_date).toLocaleDateString();
            });
        }

        async function loadInstructors() {
            const res = await fetch('/api/instructors', { credentials: 'include' });
            const instructors = await res.json();
            const tbody = document.getElementById('instructorList');
            tbody.innerHTML = '';
            instructors.forEach(inst => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = inst.name;
                row.insertCell(1).textContent = inst.department;
                row.insertCell(2).textContent = inst.subject || '-';
                const deleteBtn = document.createElement('button');
                deleteBtn.innerHTML = '<i class="fas fa-trash"></i> Delete';
                deleteBtn.style.background = '#dc3545';
                deleteBtn.style.color = 'white';
                deleteBtn.style.border = 'none';
                deleteBtn.style.padding = '5px 10px';
                deleteBtn.style.borderRadius = '5px';
                deleteBtn.style.cursor = 'pointer';
                deleteBtn.onclick = () => deleteInstructor(inst.instructor_id);
                row.insertCell(3).appendChild(deleteBtn);
            });
        }

        async function deleteInstructor(id) {
            if (confirm('Delete this instructor?')) {
                await fetch(`/api/instructors/${id}`, { method: 'DELETE', credentials: 'include' });
                loadInstructors();
            }
        }

        document.getElementById('instructorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await fetch('/api/instructors', {
                method: 'POST', credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('instName').value,
                    department: document.getElementById('instDept').value,
                    subject: document.getElementById('instSubject').value,
                    email: document.getElementById('instEmail').value
                })
            });
            e.target.reset();
            loadInstructors();
        });

        async function loadAnalytics() {
            const res = await fetch('/api/admin/stats', { credentials: 'include' });
            const stats = await res.json();
            if (distributionChart) distributionChart.destroy();
            const ctx = document.getElementById('distributionChart').getContext('2d');
            distributionChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: Object.keys(stats.distribution), datasets: [{ data: Object.values(stats.distribution), backgroundColor: ['#48246E', '#6a3a9e', '#8b5ecf', '#b088f0', '#d4b8ff'] }] }
            });
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`${tab}Tab`).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'analytics') loadAnalytics();
        }

        async function logout() { await fetch('/api/logout', { method: 'POST', credentials: 'include' }); window.location.href = '/login.html'; }
        loadAdminData();
    </script>
</body>
</html>
