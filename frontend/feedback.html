<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form - SatisfyPulse</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="purple-bar"></div>
    <div class="white-bar">
        <div class="logo">
            <h1>SatisfyPulse</h1>
            <p>Bannari Amman Institute of Technology</p>
        </div>
        <div class="user-info">
            <span id="userName"></span>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="form-container" id="feedbackFormContainer">
            <!-- Dynamic form will be loaded here -->
        </div>
    </div>

    <script>
        let currentUser = null;

        // Get feedback type from URL
        const urlParams = new URLSearchParams(window.location.search);
        const feedbackType = urlParams.get('type');

        // Check authentication
        async function checkAuth() {
            const response = await fetch('/api/me', { credentials: 'include' });
            if (!response.ok) {
                window.location.href = '/login.html';
                return;
            }
            currentUser = await response.json();
            document.getElementById('userName').textContent = currentUser.full_name;
            loadForm();
        }

        async function loadForm() {
            const container = document.getElementById('feedbackFormContainer');
            
            if (feedbackType === 'faculty') {
                container.innerHTML = getFacultyForm();
                await loadInstructors();
                attachFacultyFormHandler();
            } else if (feedbackType === 'hostel') {
                container.innerHTML = getHostelForm();
                attachHostelFormHandler();
            } else if (feedbackType === 'mess') {
                container.innerHTML = getMessForm();
                attachMessFormHandler();
            } else if (feedbackType === 'infrastructure') {
                container.innerHTML = getInfrastructureForm();
                attachInfrastructureFormHandler();
            } else {
                container.innerHTML = '<div class="card"><h3>Invalid Feedback Type</h3><p>Please select a valid feedback category.</p><a href="/student.html">Go back to Dashboard</a></div>';
            }
        }

        async function loadInstructors() {
            const dept = currentUser.department;
            const response = await fetch(`/api/instructors?department=${dept}`, { credentials: 'include' });
            const instructors = await response.json();
            
            const select = document.getElementById('instructor_name');
            if (select) {
                select.innerHTML = '<option value="">Select Instructor</option>';
                instructors.forEach(inst => {
                    select.innerHTML += `<option value="${inst.name}">${inst.name} - ${inst.designation || 'Professor'}</option>`;
                });
            }
        }

        function getFacultyForm() {
            return `
                <h2 style="text-align: center; margin-bottom: 30px;"><i class="fas fa-chalkboard-user"></i> Faculty Feedback</h2>
                <div id="alert" style="display: none;"></div>
                <form id="facultyForm">
                    <div class="form-group">
                        <label><i class="fas fa-user-tie"></i> Instructor Name</label>
                        <select id="instructor_name" required>
                            <option value="">Select Instructor</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-book"></i> Subject/Course</label>
                        <input type="text" id="subject" required placeholder="Enter subject name">
                    </div>
                    <div class="rating-group">
                        <label>Teaching Quality</label>
                        <div class="rating-stars" data-rating="teaching_quality">
                            <span class="star" data-value="1">★</span>
                            <span class="star" data-value="2">★</span>
                            <span class="star" data-value="3">★</span>
                            <span class="star" data-value="4">★</span>
                            <span class="star" data-value="5">★</span>
                        </div>
                        <input type="hidden" id="teaching_quality" value="0">
                    </div>
                    <div class="rating-group">
                        <label>Punctuality</label>
                        <div class="rating-stars" data-rating="punctuality">
                            <span class="star" data-value="1">★</span>
                            <span class="star" data-value="2">★</span>
                            <span class="star" data-value="3">★</span>
                            <span class="star" data-value="4">★</span>
                            <span class="star" data-value="5">★</span>
                        </div>
                        <input type="hidden" id="punctuality" value="0">
                    </div>
                    <div class="rating-group">
                        <label>Doubt Clearing</label>
                        <div class="rating-stars" data-rating="doubt_clearing">
                            <span class="star" data-value="1">★</span>
                            <span class="star" data-value="2">★</span>
                            <span class="star" data-value="3">★</span>
                            <span class="star" data-value="4">★</span>
                            <span class="star" data-value="5">★</span>
                        </div>
                        <input type="hidden" id="doubt_clearing" value="0">
                    </div>
                    <div class="rating-group">
                        <label>Overall Rating</label>
                        <div class="rating-stars" data-rating="overall_rating">
                            <span class="star" data-value="1">★</span>
                            <span class="star" data-value="2">★</span>
                            <span class="star" data-value="3">★</span>
                            <span class="star" data-value="4">★</span>
                            <span class="star" data-value="5">★</span>
                        </div>
                        <input type="hidden" id="overall_rating" value="0">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-comment"></i> Comments</label>
                        <textarea id="comments" rows="4" placeholder="Share your feedback..."></textarea>
                    </div>
                    <button type="submit" class="btn">Submit Feedback</button>
                </form>
            `;
        }

        function getHostelForm() {
            return `
                <h2 style="text-align: center; margin-bottom: 30px;"><i class="fas fa-building"></i> Hostel Feedback</h2>
                <div id="alert" style="display: none;"></div>
                <form id="hostelForm">
                    <div class="form-group">
                        <label>Hostel Block</label>
                        <select id="block_name" required>
                            <option value="">Select Block</option>
                            <option value="Block A">Block A</option>
                            <option value="Block B">Block B</option>
                            <option value="Block C">Block C</option>
                            <option value="Block D">Block D</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Room Type</label>
                        <select id="room_type" required>
                            <option value="">Select Room Type</option>
                            <option value="Single">Single</option>
                            <option value="Double">Double</option>
                            <option value="Triple">Triple</option>
                        </select>
                    </div>
                    ${getRatingFields(['cleanliness', 'water_supply', 'electricity', 'wifi_quality', 'warden_behavior', 'security', 'maintenance'])}
                    <div class="form-group">
                        <label><i class="fas fa-comment"></i> Comments</label>
                        <textarea id="comments" rows="4" placeholder="Share your hostel experience..."></textarea>
                    </div>
                    <button type="submit" class="btn">Submit Feedback</button>
                </form>
            `;
        }

        function getMessForm() {
            return `
                <h2 style="text-align: center; margin-bottom: 30px;"><i class="fas fa-utensils"></i> Mess Feedback</h2>
                <div id="alert" style="display: none;"></div>
                <form id="messForm">
                    <div class="form-group">
                        <label>Mess Type</label>
                        <select id="mess_type" required>
                            <option value="">Select Mess Type</option>
                            <option value="Vegetarian">Vegetarian</option>
                            <option value="Non-Vegetarian">Non-Vegetarian</option>
                        </select>
                    </div>
                    ${getRatingFields(['food_quality', 'taste', 'hygiene', 'variety', 'quantity', 'serving_staff'])}
                    <div class="form-group">
                        <label><i class="fas fa-lightbulb"></i> Suggestions</label>
                        <textarea id="suggestions" rows="4" placeholder="Share your suggestions..."></textarea>
                    </div>
                    <button type="submit" class="btn">Submit Feedback</button>
                </form>
            `;
        }

        function getInfrastructureForm() {
            return `
                <h2 style="text-align: center; margin-bottom: 30px;"><i class="fas fa-school"></i> Infrastructure Feedback</h2>
                <div id="alert" style="display: none;"></div>
                <form id="infrastructureForm">
                    <div class="form-group">
                        <label>Location</label>
                        <select id="location" required>
                            <option value="">Select Location</option>
                            <option value="Classroom">Classroom</option>
                            <option value="Lab">Lab</option>
                            <option value="Library">Library</option>
                            <option value="Auditorium">Auditorium</option>
                            <option value="Sports Ground">Sports Ground</option>
                        </select>
                    </div>
                    ${getRatingFields(['cleanliness', 'seating', 'lighting', 'ventilation', 'equipment', 'maintenance'])}
                    <div class="form-group">
                        <label><i class="fas fa-comment"></i> Comments</label>
                        <textarea id="comments" rows="4" placeholder="Share your feedback about infrastructure..."></textarea>
                    </div>
                    <button type="submit" class="btn">Submit Feedback</button>
                </form>
            `;
        }

        function getRatingFields(fields) {
            const fieldLabels = {
                'cleanliness': 'Cleanliness',
                'water_supply': 'Water Supply',
                'electricity': 'Electricity',
                'wifi_quality': 'WiFi Quality',
                'warden_behavior': 'Warden Behavior',
                'security': 'Security',
                'maintenance': 'Maintenance',
                'food_quality': 'Food Quality',
                'taste': 'Taste',
                'hygiene': 'Hygiene',
                'variety': 'Variety',
                'quantity': 'Quantity',
                'serving_staff': 'Serving Staff',
                'seating': 'Seating Comfort',
                'lighting': 'Lighting',
                'ventilation': 'Ventilation',
                'equipment': 'Equipment'
            };
            
            let html = '';
            fields.forEach(field => {
                html += `
                    <div class="rating-group">
                        <label>${fieldLabels[field] || field.replace('_', ' ').toUpperCase()}</label>
                        <div class="rating-stars" data-rating="${field}">
                            <span class="star" data-value="1">★</span>
                            <span class="star" data-value="2">★</span>
                            <span class="star" data-value="3">★</span>
                            <span class="star" data-value="4">★</span>
                            <span class="star" data-value="5">★</span>
                        </div>
                        <input type="hidden" id="${field}" value="0">
                    </div>
                `;
            });
            return html;
        }

        function attachStarRatings() {
            document.querySelectorAll('.rating-stars').forEach(container => {
                const stars = container.querySelectorAll('.star');
                const ratingType = container.dataset.rating;
                
                stars.forEach(star => {
                    star.addEventListener('click', function() {
                        const value = parseInt(this.dataset.value);
                        document.getElementById(ratingType).value = value;
                        
                        stars.forEach((s, index) => {
                            if (index < value) {
                                s.classList.add('active');
                            } else {
                                s.classList.remove('active');
                            }
                        });
                    });
                });
            });
        }

        function attachFacultyFormHandler() {
            attachStarRatings();
            document.getElementById('facultyForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = {
                    instructor_name: document.getElementById('instructor_name').value,
                    subject: document.getElementById('subject').value,
                    teaching_quality: parseInt(document.getElementById('teaching_quality').value),
                    punctuality: parseInt(document.getElementById('punctuality').value),
                    doubt_clearing: parseInt(document.getElementById('doubt_clearing').value),
                    overall_rating: parseInt(document.getElementById('overall_rating').value),
                    comments: document.getElementById('comments').value
                };
                
                const response = await fetch('/api/feedback/faculty', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                if (response.ok) {
                    showAlert('Feedback submitted successfully!', 'success');
                    setTimeout(() => window.location.href = '/student.html', 2000);
                } else {
                    showAlert(data.error, 'error');
                }
            });
        }

        function attachHostelFormHandler() {
            attachStarRatings();
            document.getElementById('hostelForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = {
                    block_name: document.getElementById('block_name').value,
                    room_type: document.getElementById('room_type').value,
                    cleanliness: parseInt(document.getElementById('cleanliness').value),
                    water_supply: parseInt(document.getElementById('water_supply').value),
                    electricity: parseInt(document.getElementById('electricity').value),
                    wifi_quality: parseInt(document.getElementById('wifi_quality').value),
                    warden_behavior: parseInt(document.getElementById('warden_behavior').value),
                    security: parseInt(document.getElementById('security').value),
                    maintenance: parseInt(document.getElementById('maintenance').value),
                    comments: document.getElementById('comments').value
                };
                
                const response = await fetch('/api/feedback/hostel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                if (response.ok) {
                    showAlert('Hostel feedback submitted successfully!', 'success');
                    setTimeout(() => window.location.href = '/student.html', 2000);
                } else {
                    showAlert(data.error, 'error');
                }
            });
        }

        function attachMessFormHandler() {
            attachStarRatings();
            document.getElementById('messForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = {
                    mess_type: document.getElementById('mess_type').value,
                    food_quality: parseInt(document.getElementById('food_quality').value),
                    taste: parseInt(document.getElementById('taste').value),
                    hygiene: parseInt(document.getElementById('hygiene').value),
                    variety: parseInt(document.getElementById('variety').value),
                    quantity: parseInt(document.getElementById('quantity').value),
                    serving_staff: parseInt(document.getElementById('serving_staff').value),
                    suggestions: document.getElementById('suggestions').value
                };
                
                const response = await fetch('/api/feedback/mess', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                if (response.ok) {
                    showAlert('Mess feedback submitted successfully!', 'success');
                    setTimeout(() => window.location.href = '/student.html', 2000);
                } else {
                    showAlert(data.error, 'error');
                }
            });
        }

        function attachInfrastructureFormHandler() {
            attachStarRatings();
            document.getElementById('infrastructureForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = {
                    location: document.getElementById('location').value,
                    cleanliness: parseInt(document.getElementById('cleanliness').value),
                    seating: parseInt(document.getElementById('seating').value),
                    lighting: parseInt(document.getElementById('lighting').value),
                    ventilation: parseInt(document.getElementById('ventilation').value),
                    equipment: parseInt(document.getElementById('equipment').value),
                    maintenance: parseInt(document.getElementById('maintenance').value),
                    comments: document.getElementById('comments').value
                };
                
                const response = await fetch('/api/feedback/infrastructure', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                if (response.ok) {
                    showAlert('Infrastructure feedback submitted successfully!', 'success');
                    setTimeout(() => window.location.href = '/student.html', 2000);
                } else {
                    showAlert(data.error, 'error');
                }
            });
        }

        function showAlert(msg, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-triangle' : 'check-circle'}"></i> ${msg}`;
            alertDiv.className = `alert alert-${type === 'error' ? 'error' : 'success'}`;
            alertDiv.style.display = 'block';
            setTimeout(() => alertDiv.style.display = 'none', 3000);
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST', credentials: 'include' });
            window.location.href = '/login.html';
        }

        checkAuth();
    </script>
</body>
</html>
