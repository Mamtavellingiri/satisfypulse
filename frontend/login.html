<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SatisfyPulse</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="purple-bar"></div>
    <div class="white-bar">
        <div class="logo">
            <h1>SatisfyPulse</h1>
            <p>Bannari Amman Institute of Technology</p>
        </div>
    </div>

    <div class="container">
        <div class="form-container">
            <div style="text-align: center; margin-bottom: 30px;">
                <i class="fas fa-sign-in-alt" style="font-size: 50px; color: #48246E;"></i>
                <h2 style="margin-top: 10px;">Login to SatisfyPulse</h2>
            </div>
            <div id="alert" style="display: none;"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                Don't have an account? <a href="register.html">Register here</a>
            </p>
            <hr style="margin: 20px 0;">
            <div style="font-size: 12px; color: #666;">
                <p><strong>Demo Credentials:</strong></p>
                <p><i class="fas fa-user-graduate"></i> Student: rahul.cs23@bitsathy.ac.in / password123</p>
                <p><i class="fas fa-user-shield"></i> Admin: admin@bitsathy.ac.in / admin123</p>
                <p><i class="fas fa-chalkboard-user"></i> Faculty: dr.sasikala@bitsathy.ac.in / faculty123</p>
            </div>
        </div>
    </div>

    <script>
        // BACKEND API URL
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    if (data.user.role === 'student') window.location.href = 'student.html';
                    else if (data.user.role === 'faculty') window.location.href = 'faculty.html';
                    else if (data.user.role === 'admin') window.location.href = 'admin.html';
                } else {
                    const alertDiv = document.getElementById('alert');
                    alertDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${data.error}`;
                    alertDiv.className = 'alert alert-error';
                    alertDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Login error:', error);
                const alertDiv = document.getElementById('alert');
                alertDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Cannot connect to server. Please make sure the backend is running.`;
                alertDiv.className = 'alert alert-error';
                alertDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
